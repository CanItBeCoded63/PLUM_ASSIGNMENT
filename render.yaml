services:
  - type: web
    name: opd-claim-system
    env: node
    plan: free
    buildCommand: npm install && cd frontend && npm install --production=false && npm run build && cd ../backend && npm install --production=false && npm run build
    startCommand: node backend/dist/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: npm_config_production
        value: "false"
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        value: "*"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://openrouter.ai/api/v1
