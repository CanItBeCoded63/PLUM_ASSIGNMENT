[phases.setup]
nixPkgs = ["nodejs_20", "tesseract"]

[phases.install]
cmds = [
  "cd frontend && npm install --legacy-peer-deps",
  "cd backend && npm install --legacy-peer-deps"
]

[phases.build]
cmds = [
  "cd frontend && npm run build",
  "cd backend && npm run build"
]

[start]
cmd = "node backend/dist/server.js"
